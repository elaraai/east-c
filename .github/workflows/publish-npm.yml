name: Publish npm

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease   # 0.0.1-beta.7 -> 0.0.1-beta.8 (npm tag: beta)
          - prepatch     # 0.0.1-beta.8 -> 0.0.2-beta.0 (npm tag: beta)
          - preminor     # 0.0.1-beta.8 -> 0.1.0-beta.0 (npm tag: beta)
          - premajor     # 0.0.1-beta.8 -> 1.0.0-beta.0 (npm tag: beta)
          - patch        # 0.0.1 -> 0.0.2 (npm tag: latest)
          - minor        # 0.0.1 -> 0.1.0 (npm tag: latest)
          - major        # 0.0.1 -> 1.0.0 (npm tag: latest)
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for npm trusted publishers (OIDC)

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "elara-ci[bot]"
          git config user.email "elara-ci[bot]@users.noreply.github.com"

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM
        run: |
          mkdir -p build-wasm && cd build-wasm
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)
          cd ..
          mkdir -p packages/east-c-wasm/dist/wasm
          cp build-wasm/packages/east-c-wasm/east-c.js packages/east-c-wasm/dist/wasm/
          cp build-wasm/packages/east-c-wasm/east-c.wasm packages/east-c-wasm/dist/wasm/
          echo '{ "type": "module" }' > packages/east-c-wasm/dist/wasm/package.json

      - name: Install npm dependencies
        working-directory: packages/east-c-wasm
        run: npm install

      - name: Build TypeScript
        working-directory: packages/east-c-wasm
        run: npm run build

      - name: Run tests
        working-directory: packages/east-c-wasm
        run: node --enable-source-maps --test 'dist/test/**/*.spec.js'

      - name: Determine npm tag
        id: npm_tag
        run: |
          if [[ "${{ inputs.release_type }}" == pre* ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump east-c-wasm version
        id: version_wasm
        working-directory: packages/east-c-wasm
        run: |
          if [[ "${{ inputs.release_type }}" == pre* ]]; then
            npm version ${{ inputs.release_type }} --preid=beta --no-git-tag-version
          else
            npm version ${{ inputs.release_type }} --no-git-tag-version
          fi
          echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit, tag, and push
        if: ${{ !inputs.dry_run }}
        run: |
          TAG_NAME="east-c-wasm-${{ steps.version_wasm.outputs.new_version }}"

          git add packages/east-c-wasm/package.json
          git commit -m "chore: bump east-c-wasm to ${{ steps.version_wasm.outputs.new_version }}"

          # Delete stale remote tag if it exists from a previous failed run
          git push origin ":refs/tags/${TAG_NAME}" 2>/dev/null || true

          git tag -f "${TAG_NAME}"
          git push origin HEAD:main "${TAG_NAME}"

      - name: Publish @elaraai/east-c-wasm
        if: ${{ !inputs.dry_run }}
        working-directory: packages/east-c-wasm
        run: npm publish --access public --provenance --tag ${{ steps.npm_tag.outputs.tag }}

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: east-c-wasm-${{ steps.version_wasm.outputs.new_version }}
          name: "@elaraai/east-c-wasm ${{ steps.version_wasm.outputs.new_version }}"
          generate_release_notes: true
          prerelease: ${{ steps.npm_tag.outputs.prerelease == 'true' }}
